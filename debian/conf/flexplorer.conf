# flexplorer default Apache configuration

Alias /flexplorer /usr/share/flexplorer/

<Directory /usr/share/flexplorer/>
	Options FollowSymLinks
	DirectoryIndex index.php

	<IfModule mod_php.c>
		php_admin_flag allow_url_fopen On
		php_admin_value open_basedir /usr/share/flexplorer/:/usr/lib/flexplorer/:/etc/flexplorer/:/usr/share/php/:/usr/share/javascript/:/var/tmp:/tmp:/etc/apache2/conf-enabled/:/var/lib/flexplorer:/usr/share/locale
	</IfModule>

# enable gzip compression
<IfModule mod_deflate.c>
  AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css application/x-javascript text/javascript application/javascript application/json
</IfModule>

</Directory>


